# Orbit Meeting — Electron Builder Configuration
# Builds platform-specific installers from the Next.js standalone build.

appId: ai.eburon.orbit.meeting
productName: Orbit Meeting
copyright: Copyright © 2026 Eburon AI

directories:
  output: dist-electron
  buildResources: electron/assets

files:
  - electron/**/*
  - package.json

extraResources:
  - from: .next/standalone
    to: app
    filter:
      - "**/*"
      - "!**/*.map"
      - "!.next/node_modules/**"

# Next.js standalone puts server.js + .next at root
asar: true
asarUnpack:
  - "**/*.node"
  - ".next/server/**"

# macOS config is passed via CLI args in CI (--config.mac.*) to avoid
# cross-platform schema validation errors on Linux/Windows with
# electron-builder 26. See .github/workflows/signed-release.yml.

win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: [x64]
  artifactName: "${productName}-${version}-win-${arch}.${ext}"
  icon: electron/assets/icon.ico

linux:
  category: Network
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  icon: electron/assets

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: electron/assets/icon.ico

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish: null
