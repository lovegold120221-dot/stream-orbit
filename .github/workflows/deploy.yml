# Orbit Meeting — Deploy to Vercel
# Pushes to main trigger a full Vercel build + production deployment.

name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Link Vercel project
        run: npx vercel@latest link --yes --project=${{ secrets.VERCEL_PROJECT_ID }} --scope=${{ secrets.VERCEL_ORG_ID }}

      - name: Pull Vercel environment
        run: npx vercel@latest pull --yes --environment=production

      - name: Vercel build + deploy (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx vercel@latest deploy --prod

      - name: Vercel build + deploy (Preview)
        if: github.event_name == 'pull_request'
        run: npx vercel@latest deploy
